name: Post YouTube Shorts

on:
  schedule:
    - cron: '0 6 * * *'    # 6 AM UTC  — Slot 0
    - cron: '0 10 * * *'   # 10 AM UTC — Slot 1
    - cron: '0 14 * * *'   # 2 PM UTC  — Slot 2
    - cron: '0 18 * * *'   # 6 PM UTC  — Slot 3
    - cron: '0 22 * * *'   # 10 PM UTC — Slot 4
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      slot:
        description: 'Which slot to run (0=6AM, 1=10AM, 2=2PM, 3=6PM, 4=10PM)'
        required: false
        default: '0'

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_SECRETS_FILE: client_secrets.json
      YOUTUBE_TOKEN_FILE: youtube_token.json
      POSTING_TIMES: "06:00,10:00,14:00,18:00,22:00"
      MADE_FOR_KIDS: "false"
      GEMINI_TTS_VOICE: "Charon"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-dejavu-core ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check secrets are set
        run: |
          echo "ANTHROPIC_API_KEY set: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "GOOGLE_AI_STUDIO_API_KEY set: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY != '' }}"
          echo "YOUTUBE_CLIENT_SECRETS set: ${{ secrets.YOUTUBE_CLIENT_SECRETS != '' }}"
          echo "YOUTUBE_TOKEN set: ${{ secrets.YOUTUBE_TOKEN != '' }}"

      - name: Restore YouTube credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json
          echo "client_secrets.json size: $(wc -c < client_secrets.json) bytes"
          echo "youtube_token.json size: $(wc -c < youtube_token.json) bytes"

      - name: Determine slot from schedule
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H | sed 's/^0//')
            if [ "${HOUR:-0}" -lt 8 ]; then
              echo "slot=0" >> $GITHUB_OUTPUT
            elif [ "${HOUR:-0}" -lt 12 ]; then
              echo "slot=1" >> $GITHUB_OUTPUT
            elif [ "${HOUR:-0}" -lt 16 ]; then
              echo "slot=2" >> $GITHUB_OUTPUT
            elif [ "${HOUR:-0}" -lt 20 ]; then
              echo "slot=3" >> $GITHUB_OUTPUT
            else
              echo "slot=4" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Running slot: ${{ steps.slot.outputs.slot }}"

      - name: Run pipeline
        run: python main.py --run-now --slot ${{ steps.slot.outputs.slot }}

      - name: Upload result as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-output-${{ github.run_number }}
          path: |
            output/**/result.json
            output/**/seo.json
            output/**/script.json
            logs/
          retention-days: 30
